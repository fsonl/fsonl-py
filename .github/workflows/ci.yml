name: CI

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: pytest tests/

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packaging
        run: pip install packaging

      - name: Check version against PyPI
        run: |
          LOCAL=$(python -c "
          import re, pathlib
          text = pathlib.Path('src/fsonl/__init__.py').read_text()
          print(re.search(r'__version__\s*=\s*\"(.+?)\"', text).group(1))
          ")
          echo "Local version: $LOCAL"

          PYPI=$(curl -s https://pypi.org/pypi/fsonl/json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['info']['version'])
          " 2>/dev/null || echo "0.0.0")
          echo "PyPI version: $PYPI"

          python -c "
          from packaging.version import Version
          local = Version('$LOCAL')
          pypi = Version('$PYPI')
          if local <= pypi:
              raise SystemExit(f'Version {local} must be greater than PyPI version {pypi}')
          print(f'OK: {local} > {pypi}')
          "

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install fsonl-py
        run: pip install -e .

      - name: Checkout E2E tests
        run: git clone --depth 1 https://github.com/fsonl/fsonl.git fsonl-e2e

      - name: Run E2E tests
        run: python fsonl-e2e/run_tests.py --bin fsonl fsonl-e2e/tests/
