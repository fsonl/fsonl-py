name: Publish

on:
  push:
    branches: [main]

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check version against PyPI
        run: |
          LOCAL=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "Local version: $LOCAL"

          PYPI=$(curl -s https://pypi.org/pypi/fsonl/json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['info']['version'])
          " 2>/dev/null || echo "0.0.0")
          echo "PyPI version: $PYPI"

          python -c "
          from packaging.version import Version
          local = Version('$LOCAL')
          pypi = Version('$PYPI')
          if local <= pypi:
              raise SystemExit(f'Version {local} must be greater than PyPI version {pypi}')
          print(f'OK: {local} > {pypi}')
          "

  build:
    name: Build
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
